name: CI (pytest gate)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies (lightweight)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/ci.txt

      - name: Run fast pytest gate
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          PAPER_MAX_INVESTED_RATIO: "0.8"
          KIS_IS_MOCK: "true"
          KIS_DRY_RUN: "false"
          PAPER_BROKER_ENABLED: "true"
        run: |
          pytest --gate fast -q --tb=short
